<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD USER</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="main">
        <div id="user-info"></div>
        <div id="profile-info"></div>

        <div class="container" id="input-container">
            <input type="text" id="fullName" class="input-auth" placeholder="full name">
            <textarea id="bio" class="input-auth" placeholder="description"></textarea>
            <input type="date" id="birthDate" class="input-auth">
        </div>

        <div id="btn-container">
            <button id="saveProfile" class="btn-success">Save</button>
            <button id="logout" class="btn-success">Exit</button>
        </div>
    </div>

    <script src="/dashboard.js"></script>
</body>
</html>
